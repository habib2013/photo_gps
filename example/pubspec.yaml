name: cdl_photo_gps_example
description: Example app demonstrating CDL Photo GPS SDK usage
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  
  # Use the SDK from parent directory
  cdl_photo_gps:
    path: ../
  
  # Need camera for CameraPreview widget
  camera: ^0.10.5+5
  
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
